<app-content-frame #frameRef>
  <div frame-header>
    <h1 #frameTitle>Все курсы платформы</h1>
    <p>
      На странице показан каталог курсов с фильтрами. Здесь используются вложенные компоненты,
      ng-content, ViewChild, ContentChild и шаблонные переменные.
    </p>
  </div>

  <app-course-filters
    #filtersRef
    [tracks]="tracks"
    [selectedTrack]="selectedTrack"
    [showOnlyOpen]="showOnlyOpen"
    (trackChange)="onTrackChange($event)"
    (onlyOpenChange)="onOnlyOpenChange($event)"
  ></app-course-filters>

  <div class="tools">
    <button type="button" (click)="filtersRef.resetToAll()">Сбросить фильтр (template var)</button>
    <button type="button" (click)="resetByViewChild()">Сбросить фильтр (ViewChild)</button>
    <button type="button" (click)="frameRef.highlightTitle()">Подсветить заголовок (template var)</button>
    <button type="button" (click)="highlightHeaderByViewChild()">Подсветить заголовок (ViewChild)</button>
    <button type="button" (click)="clearHeaderByViewChild()">Убрать подсветку</button>
  </div>

  <section *ngIf="visibleCourses.length > 0; else emptyBlock" class="course-grid">
    <app-course-card
      *ngFor="let course of visibleCourses; let i = index"
      [course]="course"
      [index]="i"
    ></app-course-card>
  </section>

  <ng-template #emptyBlock>
    <p class="empty">По выбранным фильтрам курсов не найдено.</p>
  </ng-template>

  <div class="actions">
    <a routerLink="/">На главную</a>
    <a routerLink="/course">К программе</a>
  </div>
</app-content-frame>
