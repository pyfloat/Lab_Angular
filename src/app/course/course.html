<section class="catalog-head">
  <div>
    <h1>Программа курса «Системное администрирование»</h1>
    <p>
      Ниже показаны основные учебные модули курса. Данные загружаются из сервиса
      `CourseService` и выводятся через дочерний компонент карточки.
    </p>
  </div>
  <img src="images/moderation.svg" alt="Учебные модули курса" />
</section>

<section class="module-grid">
  <app-module-card
    *ngFor="let course of courses"
    [title]="course.title"
    [description]="course.description"
    [image]="course.image"
    [price]="course.price"
  ></app-module-card>
</section>

<app-comments-chat class="chat-section"></app-comments-chat>

<section class="catalog-actions">
  <a routerLink="/">На главную</a>
  <a routerLink="/about">К команде курса</a>
</section>
