<section class="catalog-head">
  <div>
    <h1>Программа курса «Системное администрирование»</h1>
    <p>
      Ниже показаны основные учебные модули курса: Linux, сети, безопасность и
      итоговая практика с разбором типовых задач системного администратора.
    </p>
  </div>
  <img src="images/moderation.svg" alt="Учебные модули курса" />
</section>

<section class="module-grid">
  <app-module-card
    *ngFor="let module of modules"
    [title]="module.title"
    [description]="module.description"
    [image]="module.image"
    [level]="module.level"
    [duration]="module.duration"
    [highlighted]="module.highlighted ?? false"
  ></app-module-card>
</section>

<app-comments-chat class="chat-section"></app-comments-chat>

<section class="catalog-actions">
  <a routerLink="/">На главную</a>
  <a routerLink="/about">К команде курса</a>
</section>
