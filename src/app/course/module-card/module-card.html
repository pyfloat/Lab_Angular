<article class="module-card" [class.module-card--highlighted]="highlighted" [attr.data-level]="level">
  <img [src]="image" [alt]="title" />
  <h3>{{ title }}</h3>
  <p class="module-card__meta">
    Уровень: <strong>{{ level }}</strong> | Длительность: {{ duration }}
  </p>
  <p>{{ description }}</p>
</article>
